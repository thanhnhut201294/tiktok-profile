<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TikTok Channel Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* === THIẾT KẾ NEUBRUTALISM === */
        :root {
            --primary: #ff0050;
            --secondary: #00f2ea;
            --yellow: #ffd900;
            --bg-color: #f0f4f8;
            --border-color: #000;
            --white: #fff;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Be Vietnam Pro', sans-serif; 
            padding: 20px; 
            background: var(--bg-color); 
            color: var(--border-color);
            background-image: radial-gradient(#dbe3ea 15%, transparent 16%);
            background-size: 20px 20px;
        }

        main { 
            max-width: 1400px; 
            margin: 20px auto; 
            background: var(--white); 
            padding: 30px; 
            border: 3px solid var(--border-color);
            box-shadow: 10px 10px 0px var(--border-color);
            border-radius: 20px;
        }

        h1 { 
            font-family: 'Fredoka', sans-serif; 
            margin-top: 0; 
            text-align: center; 
            color: var(--primary); 
            font-size: 3rem;
            text-shadow: 3px 3px 0px var(--border-color);
            margin-bottom: 30px;
        }

        /* === DASHBOARD === */
        #stats-board { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        
        .stat-card { 
            background: #fff; padding: 15px; text-align: center; 
            border: 3px solid var(--border-color);
            box-shadow: 6px 6px 0px var(--border-color);
            border-radius: 15px; transition: transform 0.2s;
        }
        
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card:nth-child(1) { background: #e0f7fa; }
        .stat-card:nth-child(2) { background: #fce4ec; }
        .stat-card:nth-child(3) { background: #fff9c4; }
        .stat-card:nth-child(4) { background: #f3e5f5; }
        .stat-card:nth-child(5) { background: #e8f5e9; }
        .stat-card:nth-child(6) { background: #ffe0b2; }

        .stat-title { font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .stat-avg { 
            font-size: 12px; font-weight: 600; background: var(--border-color); 
            color: var(--white); display: inline-block; padding: 4px 10px; border-radius: 8px;
        }

        /* === CONTROLS (INPUTS & FILTER) === */
        .controls-wrapper {
            display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; align-items: flex-end;
        }

        .input-group { flex: 1; min-width: 300px; }
        .limit-group { width: 120px; }
        .filter-group { 
            display: flex; align-items: center; gap: 10px; 
            height: 54px; padding: 0 15px; 
            border: 3px solid var(--border-color); 
            border-radius: 12px; background: #fafafa;
        }

        label { font-weight: 700; margin-bottom: 8px; display: block; font-size: 15px; }
        
        input[type="text"], input[type="number"] { 
            width: 100%; height: 54px; padding: 0 15px; font-size: 16px; 
            font-family: inherit; border: 3px solid var(--border-color);
            border-radius: 12px; outline: none; transition: 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            background: #fdffed; box-shadow: 4px 4px 0px var(--primary); transform: translate(-2px, -2px);
        }

        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); }
        .filter-group label { margin-bottom: 0; cursor: pointer; }

        /* === TOOLBAR === */
        .toolbar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        
        button { 
            padding: 0 25px; height: 54px; cursor: pointer; font-weight: 700; font-size: 15px; 
            font-family: inherit; border: 3px solid var(--border-color);
            box-shadow: 5px 5px 0px var(--border-color); border-radius: 12px; transition: all 0.1s;
        }
        button:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px var(--border-color); }
        button:disabled { background: #ccc !important; color: #777 !important; box-shadow: none !important; cursor: not-allowed; }
        
        #fetchBtn { background: var(--primary); color: #fff; }
        .btn-secondary { background: var(--white); color: var(--border-color); }
        .btn-excel { background: var(--secondary); color: var(--border-color); }

        /* === LOGGER === */
        #status { 
            margin-bottom: 25px; padding: 15px; border-radius: 12px; font-weight: 600;
            border: 3px solid var(--border-color); background: #fff;
        }
        .log-process { background: #e3f2fd !important; color: #0d47a1; }
        .log-done { background: #e8f5e9 !important; color: #1b5e20; }
        .log-error { background: #ffebee !important; color: #b71c1c; }

        /* === TABLE === */
        .table-container { overflow-x: auto; border-radius: 15px; border: 3px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { 
            background: var(--secondary); color: var(--border-color); font-weight: 700; 
            padding: 15px; text-align: left; border-bottom: 3px solid var(--border-color); border-right: 2px solid var(--border-color);
        }
        td { border-bottom: 2px solid var(--border-color); border-right: 2px solid var(--border-color); padding: 12px 15px; font-weight: 500; }
        tr:last-child td { border-bottom: none; }
        th:last-child, td:last-child { border-right: none; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #fffde7; }
        
        .col-thumb img { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border-color); }
        .col-caption { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge-pin { background: var(--yellow); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 800; border: 1px solid var(--border-color); margin-right: 6px; }
        .col-link a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<main>
    <h1>🎬 TikTok Channel Analyzer</h1>
    
    <div id="stats-board">
        <div class="stat-card">
            <div class="stat-title">Lượt Xem 👁️</div><div class="stat-value" id="total-view">0</div><div class="stat-avg" id="avg-view">TB: 0</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Tim ❤️</div><div class="stat-value" id="total-like">0</div><div class="stat-avg" id="avg-like">TB: 0</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Bình Luận 💬</div><div class="stat-value" id="total-cmt">0</div><div class="stat-avg" id="avg-cmt">TB: 0</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Lưu 💾</div><div class="stat-value" id="total-save">0</div><div class="stat-avg" id="avg-save">TB: 0</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Chia Sẻ 🔗</div><div class="stat-value" id="total-share">0</div><div class="stat-avg" id="avg-share">TB: 0</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Tổng Video 📹</div><div class="stat-value" id="total-videos">0</div><div class="stat-avg">Đã Quét</div>
        </div>
    </div>

    <div class="controls-wrapper">
        <div class="input-group">
            <label>📝 Username TikTok (VD: @vtv24news):</label>
            <input type="text" id="channelInput" placeholder="@username hoặc dán link kênh...">
        </div>
        <div class="limit-group">
            <label>🔢 Số lượng:</label>
            <input type="number" id="limitInput" min="1" max="30" value="30" title="Tối đa 30 video do giới hạn API">
        </div>
        <div class="filter-group">
            <input type="checkbox" id="includePinned" checked>
            <label for="includePinned">Bao gồm Video Ghim 📌</label>
        </div>
    </div>

    <div class="toolbar">
        <button id="fetchBtn">🚀 Quét Dữ Liệu</button>
        <button class="btn-secondary" id="clearBtn">🧹 Xoá Sạch</button>
        <button class="btn-excel" id="exportBtn" disabled>📥 Xuất Excel</button>
    </div>

    <div id="status">👋 Sẵn sàng! Nhập ID kênh và bấm Quét.</div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">#</th>
                    <th>Ảnh</th>
                    <th>Caption</th>
                    <th>View</th>
                    <th>Like</th>
                    <th>Cmt</th>
                    <th>Save</th>
                    <th>Share</th>
                    <th>Ngày Đăng</th>
                    <th>Link</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<script>
    let processedData = []; 

    const $ = (id) => document.getElementById(id);
    const log = (msg, type = '') => { $('status').textContent = msg; $('status').className = type; };
    const fmt = (n) => n.toLocaleString('vi-VN'); 
    const formatDate = (ts) => { const d = new Date(ts * 1000); return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth()+1).toString().padStart(2, '0')}/${d.getFullYear()}`; };
    const extractUsername = (input) => { input = input.trim(); if(input.includes('tiktok.com/')) { const match = input.match(/@([\w.-]+)/); return match ? match[1] : null; } return input.startsWith('@') ? input.substring(1) : input; };

    function updateDashboard() {
        let tView = 0, tLike = 0, tCmt = 0, tSave = 0, tShare = 0;
        const count = processedData.length;
        processedData.forEach(i => { tView += i.view; tLike += i.like; tCmt += i.comment; tSave += i.save; tShare += i.share; });
        const calcAvg = (total) => count > 0 ? fmt(Math.round(total / count)) : '0';

        $('total-view').innerText = fmt(tView);   $('avg-view').innerText = `TB: ${calcAvg(tView)}`;
        $('total-like').innerText = fmt(tLike);   $('avg-like').innerText = `TB: ${calcAvg(tLike)}`;
        $('total-cmt').innerText = fmt(tCmt);     $('avg-cmt').innerText = `TB: ${calcAvg(tCmt)}`;
        $('total-save').innerText = fmt(tSave);   $('avg-save').innerText = `TB: ${calcAvg(tSave)}`;
        $('total-share').innerText = fmt(tShare); $('avg-share').innerText = `TB: ${calcAvg(tShare)}`;
        $('total-videos').innerText = fmt(count);
    }

    // === SMART FETCH VỚI PROXY DỰ PHÒNG ===
    async function smartProxyFetch(targetUrl) {
        const PROXY_LIST = [
            { url: 'https://api.allorigins.win/get?url=', type: 'wrapped' },
            { url: 'https://corsproxy.io/?', type: 'direct' },
            { url: 'https://api.codetabs.com/v1/proxy?quest=', type: 'direct' }
        ];

        for (let proxy of PROXY_LIST) {
            try {
                const res = await fetch(proxy.url + encodeURIComponent(targetUrl));
                if (!res.ok) continue;

                let data;
                if (proxy.type === 'wrapped') {
                    const temp = await res.json();
                    if(!temp.contents) throw new Error();
                    data = JSON.parse(temp.contents);
                } else {
                    data = await res.json();
                }

                if(data.code === 0) return data; // Gọi API thành công
            } catch (e) {
                console.log(`Proxy ${proxy.url} thất bại, đang thử proxy khác...`);
            }
        }
        throw new Error("Toàn bộ proxy đều bị từ chối.");
    }

    $('fetchBtn').addEventListener('click', async () => {
        const username = extractUsername($('channelInput').value);
        if (!username) return alert("Vui lòng nhập Username hợp lệ!");

        // Lấy giới hạn và tuỳ chọn lọc
        const limitCount = Math.min(parseInt($('limitInput').value) || 30, 30);
        const isIncludePinned = $('includePinned').checked;

        processedData = []; 
        $('tableBody').innerHTML = ''; 
        updateDashboard();
        $('fetchBtn').disabled = true; $('exportBtn').disabled = true;

        log(`⏳ Đang kết nối API để quét kênh @${username}...`, 'log-process');

        try {
            // Chỉ cần gọi 1 lần vì số lượng <= 30
           const apiUrl = `/api/tikwm?unique_id=@${username}&count=35&cursor=0`;
            const res = await fetch(apiUrl);
            const data = await res.json();

            if (data && data.data && data.data.videos) {
                let rawVideos = data.data.videos;

                // 1. Lọc video ghim nếu người dùng KHÔNG tick chọn
                if (!isIncludePinned) {
                    rawVideos = rawVideos.filter(v => v.is_top !== 1);
                }

                // 2. Cắt đúng số lượng yêu cầu (Giới hạn tối đa 30)
                const finalVideos = rawVideos.slice(0, limitCount);

                finalVideos.forEach((info, index) => {
                    const resultObj = {
                        id: index + 1,
                        video_id: info.video_id,
                        author: info.author.unique_id,
                        link: `https://www.tiktok.com/@${info.author.unique_id}/video/${info.video_id}`,
                        avatar: info.cover,
                        caption: info.title || 'Không có tiêu đề',
                        view: info.play_count || 0,
                        like: info.digg_count || 0,
                        comment: info.comment_count || 0,
                        save: info.collect_count || 0,
                        share: info.share_count || 0,
                        create_time: info.create_time,
                        isPinned: info.is_top === 1
                    };
                    processedData.push(resultObj);
                    renderSingleRow(resultObj);
                });

                updateDashboard();
                log(`🎉 Hoàn tất! Đã lấy thành công ${processedData.length} video.`, 'log-done');
                if(processedData.length > 0) $('exportBtn').disabled = false;
            } else {
                throw new Error("API không trả về video nào.");
            }
        } catch (err) {
            log(`❌ Lỗi kết nối hoặc API từ chối. Hãy thử lại sau vài giây.`, 'log-error');
        }
        $('fetchBtn').disabled = false;
    });

    function renderSingleRow(data) {
        const tr = document.createElement('tr');
        const pinBadge = data.isPinned ? '<span class="badge-pin">📌 GHIM</span>' : '';
        tr.innerHTML = `
            <td>${data.id}</td>
            <td class="col-thumb"><img src="${data.avatar}" loading="lazy"></td>
            <td class="col-caption" title="${data.caption.replace(/"/g, '&quot;')}">${pinBadge}${data.caption}</td>
            <td style="font-weight:800">${fmt(data.view)}</td>
            <td>${fmt(data.like)}</td><td>${fmt(data.comment)}</td><td>${fmt(data.save)}</td><td>${fmt(data.share)}</td>
            <td>${formatDate(data.create_time)}</td>
            <td class="col-link"><a href="${data.link}" target="_blank">Xem</a></td>
        `;
        $('tableBody').appendChild(tr);
    }

    $('clearBtn').addEventListener('click', () => {
        $('channelInput').value = ''; $('tableBody').innerHTML = ''; processedData = [];
        updateDashboard(); $('exportBtn').disabled = true; log("Đã dọn dẹp sạch sẽ! 🧹");
    });

    $('exportBtn').addEventListener('click', () => {
        const headers = ['STT', 'Loai', 'Ngay Dang', 'Caption', 'View', 'Like', 'Comment', 'Save', 'Share', 'Link Goc'];
        const rows = processedData.map(i => [
            i.id, i.isPinned ? 'Ghim' : 'Thuong', formatDate(i.create_time), 
            `"${(i.caption || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`, 
            i.view, i.like, i.comment, i.save, i.share, i.link
        ]);
        const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `TikTok_${extractUsername($('channelInput').value)}_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    });
</script>
</body>
</html>
